<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="Author" content="Divan Fofia" />
    <meta name="keywords" content="Taco,LTS,Food" />
    <meta
      name="description"
      content="Contact Little Taco Shop (LTS) just by a simple click ..."
    />
    <title>Little Taco Shop Contact</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />
  </head>
  <body>
    <header>
      <h1>Contact Us</h1>
      <nav aria-label="primary navigation">
        <ul>
          <li><a href="/">Home</a></li>
        </ul>
        <ul>
          <li>
            <a href="/#about"
              >About <abbr title="Little Taco Shop">LTS</abbr></a
            >
          </li>
        </ul>
        <ul>
          <li><a href="/#menu">Our Menu</a></li>
        </ul>
        <ul>
          <li><a href="hours.html">Store Hours</a></li>
        </ul>
      </nav>
      <figure>
        <img
          src="img/tacos_close_up_400x260.png"
          width="400"
          height="260"
          title="Tacos ready to eat"
          alt="Nice Taco ready to eat image "
        />
        <figcaption>Little Taco Shop Tacos</figcaption>
      </figure>
    </header>

    <hr />

    <main>
      <section>
        <h2>Our Contact Form</h2>
        <form action="https://httpbin.org/get" method="GET">
          <fieldset>
            <legend>Send Us A Message</legend>
            <p>
              <label for="name">Name:</label
              ><input
                type="text"
                name="name"
                id="name"
                placeholder="your name"
                required
                autofocus
              />
            </p>
            <p>
              <label for="email">Email:</label>
              <input
                type="text"
                name="email"
                id="email"
                placeholder="your email"
                required
              />
            </p>
            <p>
              <label for="message">Your Message:</label>
              <br />
              <textarea
                name="message"
                id="message"
                cols="30"
                rows="10"
                placeholder="Type your message here"
              >
              </textarea>
            </p>
          </fieldset>
          <button type="submit">Send</button>
          <button
            type="submit"
            formaction="https://httpbin.org/post"
            formmethod="POST"
          >
            Post
          </button>
          <button type="reset">Reset</button>
        </form>
      </section>
      <section>
        <h2>Our Location</h2>
        <address>
          555 Taco Temptation Lane,Suite T<br />
          kansas City, MO 55555-5555 <br />
          <br />
          phone:<a href="tel:+555-555-5555">555-555-5555</a>
        </address>
      </section>

      <br />

      <a href="#">Back To Top</a>
    </main>

    <hr />

    <footer>
      <p>Copyright &copy;The Little Taco Shop</p>
    </footer>
  </body>
</html>
